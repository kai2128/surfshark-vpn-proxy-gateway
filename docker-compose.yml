services:
  gateway:
    build: .
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    # 默认的 docker-default AppArmor 策略会拦截 mount 系统调用（即使带 SYS_ADMIN）。
    # seccomp 默认策略对某些 unshare/mount 组合同样受限。
    # 创建网络命名空间需要 unshare(CLONE_NEWNET) + mount --bind，因此必须放开。
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    devices:
      - /dev/net/tun
    ports:
      - "1080:1080"
      - "8888:8888"
    volumes:
      - ./ovpn:/etc/openvpn/ovpn:ro
      - ./auth.txt:/etc/openvpn/auth.txt:ro
    environment:
      PROXY_USER: ${PROXY_USER:-user}
      PROXY_PASS: ${PROXY_PASS:-pass}
      DEFAULT_SESSION_TTL: ${DEFAULT_SESSION_TTL:-30} # MINUTES
      WORKER_IDLE_TIMEOUT: ${WORKER_IDLE_TIMEOUT:-10} # MINUTES
      WORKER_MAX_LIFETIME: ${WORKER_MAX_LIFETIME:-60} # MINUTES
      MIN_POOL_SIZE: ${MIN_POOL_SIZE:-10}
      WORKER_VERBOSE: ${WORKER_VERBOSE:-false}
    sysctls:
      net.ipv4.ip_forward: "1"
    restart: unless-stopped
